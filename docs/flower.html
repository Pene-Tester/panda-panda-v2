<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>For You ♡</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
</head>
<body class="body--memory">
  <div class="memory-bg" aria-hidden="true">
    <span class="memory-glow memory-glow--1"></span>
    <span class="memory-glow memory-glow--2"></span>
    <span class="memory-glow memory-glow--3"></span>
    <span class="memory-sparkle memory-sparkle--1">✦</span>
    <span class="memory-sparkle memory-sparkle--2">♡</span>
    <span class="memory-sparkle memory-sparkle--3">✦</span>
  </div>

  <main class="page page--memory">
    <section class="memory-scene" id="memory-scene">
      <div class="memory-card">
        <div class="memory-note">
          <p class="memory-note-text">
            Happy Birthday to the most amazing person ever! Thank you for making my life happier and brighter every day. I'm so grateful to have you in my life. I hope your day is filled with love, laughter and everything that makes you smile. I love you
          </p>
          <figure class="memory-instax">
            <img src="assets/yabbyy.jpg" alt="Us together">
          </figure>
        </div>
      </div>

      <p class="memory-hint" id="memory-hint">tap when you're ready ♡</p>
    </section>
  </main>

  <div class="reveal-overlay" id="reveal-overlay">
    <div class="bouquet-reveal">
      <img class="bouquet-full" src="assets/bouquet.png" alt="Flowers and a note for Yabbyy">
      <a class="btn-next" href="smile.html">one more thing →</a>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
